name: Update bun

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: NixOS/nix-installer-action@main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update bun
        run: |
          echo "old=$(cat VERSION)" >> "$GITHUB_ENV"
          bash update.sh
          echo "new=$(cat VERSION)" >> "$GITHUB_ENV"

      - name: Commit bun update
        run: |
          git add VERSION bun.nix
          git diff --cached --quiet && exit 0
          git commit -m "bun: ${{ env.old }} -> ${{ env.new }}"

      - name: Update flake.lock
        run: nix flake update

      - name: Commit flake.lock
        run: |
          git add flake.lock
          git diff --cached --quiet && exit 0
          git commit -m "flake.lock: bump nixpkgs"

      - name: Push
        run: git push
