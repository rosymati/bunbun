name: Update bun

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: NixOS/nix-installer-action@main

      - name: Update bun.nix and flake.lock
        run: |
          bash update.sh
          nix flake update

      - name: Commit and push
        run: |
          git diff --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bun.nix flake.lock
          git commit -m "$(git diff --cached -- bun.nix | grep -oP '(?<=version = ")[0-9.]+' | paste - - -d' -> ' | sed 's/^/bun: /')"
          git push
